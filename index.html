<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Calculator</title>
    <!-- Font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <!-- FontAwsome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Bootstrap link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.0.1/css/bootstrap.min.css" integrity="sha512-Ez0cGzNzHR1tYAv56860NLspgUGuQw16GiOOp/I2LuTmpSK9xDXlgJz3XN4cnpXWDmkNBKXR/VDMTCnAaEooxA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- CSS link -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <div class="container mt-4 mb-2">
            <div class="row text-center">
                <div class="col" id="heading">
                    <h1 class="display-5 mb-3 fw-bold">Expense Calculator</h1>
                    <p class="fs-6 mt-2">Manage your monthly budget with ease</p>
                    <div class="line"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="mt-4 mb-4">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="first d-flex justify-content-between align-items-center rounded">
                        <p>Enter Original Amount</p>
                        <div>    
                            <input type="text" class="original-amount fs-3" value="3084000" disabled/>
                            <i class="fa-regular fa-circle"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row justify-content-center rounded-3 mt-5 pt-3 pb-4 second">
                <div class="col-lg-4">
                    <div class="need">
                        <h3>Needs <span>(50%)</span></h3>
                        <p class="amount"> </p> <!--amount value from Js goes here-->
                        <div class="fDiv rounded-3 p-2">
                            <p class="text-start mb-2">Spent</p>
                            <div class="expense-list 1">
                                <div class="input-box">
                                    <input type="text" value="90000" class="rounded-3 outline-0 fs-5 spent-amount" />
                                    <i class="fa-regular fa-circle circle"></i>
                                </div>
                            </div>
                            <button type="button" class="add-expense-button">
                                + Add Expense
                            </button>
                        </div>
                        <div class="sDiv rounded-3 mt-3 p-2 pb-3">
                            <p class="text-start mb-2">Remaining</p>
                            <input type="text" value=" " class="rounded-3  outline-0 fs-5 remaining-amount" disabled/>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="want">
                        <h3>Wants <span>(30%)</span></h3>
                        <p class="amount"> </p> <!--amount value from Js goes here-->
                        <div class="fDiv rounded-3 p-2">
                            <p class="text-start mb-2">Spent</p>
                            <div class="expense-list 2">
                                <div class="input-box">
                                    <input type="text" value="48367" class="rounded-3  outline-0 fs-5 spent-amount" />
                                    <i class="fa-regular fa-circle circle"></i>
                                </div>
                            </div>
                            <button type="button" class="add-expense-button">
                                + Add Expense
                            </button>
                        </div>
                        <div class="sDiv rounded-3 mt-3 p-2 pb-3">
                            <p class="text-start mb-2">Remaining</p>
                            <input type="text" value=" " class="rounded-3  outline-0 fs-5 remaining-amount" disabled/>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="save">
                        <h3>Saving <span>(20%)</span></h3>
                        <p class="amount"> </p> <!--amount value from Js goes here-->
                        <div class="fDiv rounded-3 p-2">
                            <p class="text-start mb-2">Spent</p>
                            <div class="expense-list 3">
                                <div class="input-box">
                                    <input type="text" value="326667" class="rounded-3 outline-0 fs-5 spent-amount" />
                                    <i class="fa-regular fa-circle circle"></i>
                                </div>
                            </div>
                            <button type="button" class="add-expense-button">
                                + Add Expense
                            </button>
                        </div>
                        <div class="sDiv rounded-3 mt-3 p-2 pb-3">
                            <p class="text-start mb-2">Remaining</p>
                            <input type="text" value=" " class="rounded-3  outline-0 fs-5 remaining-amount" disabled/>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-5">
        <div class="container">
             <div class="row footer">
                <div class="col fw-bold">
                    <div class="d-flex justify-content-between align-items-center fs-5 mb-2">
                        <p class="fs-4 m-0">Total Spent</p>
                        <p class="fs-3 m-0 total-spent"></p>
                    </div>
                    <div class="line"></div>
                    <div class="d-flex justify-content-between align-items-center fs-5 mt-2">
                        <p class="fs-4 m-0">Total Remaining</p>
                        <p class="fs-3 m-0 total-remaining"></p>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="./app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Calculator</title>
    <!-- Font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <!-- FontAwsome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Bootstrap link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.0.1/css/bootstrap.min.css" integrity="sha512-Ez0cGzNzHR1tYAv56860NLspgUGuQw16GiOOp/I2LuTmpSK9xDXlgJz3XN4cnpXWDmkNBKXR/VDMTCnAaEooxA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- CSS link -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <section class="header-section">
        <div class="container mt-4 mb-2">
            <div class="row text-center">
                <div class="col" id="header">
                    <h1 class="display-5 mb-3">Expense Calculator</h1>
                    <div class="line"></div>
                    <p class="fs-6 mt-2">Manage your monthly budget with ease</p>
                </div>
            </div>
        </div>
    </section>

    <section class="body-section mt-4 mb-4">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="first d-flex justify-content-between align-items-center rounded">
                        <p>Enter Original Amount</p>
                        <div>    
                            <input type="text" class="amountInput" value="2,400,000" disabled/>
                            <i class="fa-regular fa-square-check"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row justify-content-center rounded-3 mt-5 pt-3 pb-4 second">
                <div class="col-lg-4">
                    <div class="need">
                        <h3>Needs <span>(50%)</span></h3>
                        <p class="amount">1,200,000</p>
                        <div class="fDiv rounded-3 p-2">
                            <p class="text-start mb-2">Spent</p>
                            <input type="text" value="240,000" class="rounded-3 border-0 outline-0 fs-5" disabled/>
                        </div>
                        <div class="sDiv rounded-3 mt-3 p-2">
                            <p class="text-start mb-2">Remaining</p>
                            <input type="text" value="960,000" class="rounded-3 border-0 outline-0 fs-5" disabled/>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="want">
                        <h3>Wants <span>(30%)</span></h3>
                        <p class="amount">720,000</p>
                        <div class="fDiv rounded-3 p-2">
                            <p class="text-start mb-2">Spent</p>
                            <input type="text" value="530,000" class="rounded-3 border-0 outline-0 fs-5" disabled/>
                        </div>
                        <div class="sDiv rounded-3 mt-3 p-2">
                            <p class="text-start mb-2">Remaining</p>
                            <input type="text" value="190,000" class="rounded-3 border-0 outline-0 fs-5" disabled/>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="save">
                        <h3>Saving <span>(20%)</span></h3>
                        <p class="amount">480,000</p>
                        <div class="fDiv rounded-3 p-2">
                            <p class="text-start mb-2">Spent</p>
                            <input type="text" value="210,000" class="rounded-3 border-0 outline-0 fs-5" disabled/>
                        </div>
                        <div class="sDiv rounded-3 mt-3 p-2">
                            <p class="text-start mb-2">Remaining</p>
                            <input type="text" value="270,000" class="rounded-3 border-0 outline-0 fs-5" disabled/>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="footer-section">
        <div class="container">
             <div class="row footer">
                <div class="col">
                    <div class="d-flex justify-content-between fs-5">
                        <p>Total Spent</p>
                        <p class="fs-4">2,400,000</p>
                    </div>
                    <div class="line"></div>
                    <div class="d-flex justify-content-between fs-5 mt-3">
                        <p>Total Remaining</p>
                        <p class="fs-4">2,400,000</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
